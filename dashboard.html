<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { font-family: Arial; text-align: center; margin: 0; }

.container { padding: 20px; }

button { margin: 5px; padding: 10px; font-size: 16px; }

.hidden { display: none; }

.stat { font-size: 24px; margin: 10px; }

#login {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

#positions {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.posBox {
  width: 40px;
  height: 40px;
  margin: 4px;
  line-height: 40px;
  color: white;
  border-radius: 4px;
}

.green { background: #4CAF50; }
.red { background: #d9534f; }

canvas { max-width: 100%; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>Dashboard Login</h2>
  <input id="pin" placeholder="Enter PIN">
  <button onclick="login()">Enter</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden container">

  <h1>Fowler Range Dashboard</h1>

  <div>
    <button onclick="setRange(1)">Today</button>
    <button onclick="setRange(7)">7 Days</button>
    <button onclick="setRange(30)">30 Days</button>
    <button onclick="setRange(365)">1 Year</button>
  </div>

  <div class="stat" id="total"></div>
  <div class="stat" id="active"></div>

  <h3>Active Users</h3>
  <div id="activeList"></div>

  <h3>Positions (Live)</h3>
  <div id="positions"></div>

  <h3>Check-ins Over Time</h3>
  <canvas id="chart"></canvas>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const API = "https://script.google.com/macros/s/AKfycbzlKcg8XcR8rJl8QKbzxtxvh7zJtAikaD6lQlM11DRMEQtBZU2ARXpfUsFCdXMx6hA5/exec";
const API_KEY = "9502180671447"; // 🔐 must match backend
const PIN = "4570";

let currentRange = 1;
let chart;

// LOGIN
function login(){
  if(document.getElementById("pin").value === PIN){
    document.getElementById("login").style.display = "none";
    document.getElementById("dashboard").classList.remove("hidden");
    loadData();
    setInterval(loadData, 10000);
  } else {
    alert("Wrong PIN");
  }
}

// RANGE
function setRange(days){
  currentRange = days;
  loadData();
}

// LOAD
function loadData(){
  fetch(API + "?action=dashboard&days=" + currentRange + "&key=" + API_KEY)
    .then(r => r.json())
    .then(data => {

      document.getElementById("total").innerText = "Total Check-ins: " + data.total;
      document.getElementById("active").innerText = "Active Now: " + data.active.length;

      // ACTIVE USERS
      let list = document.getElementById("activeList");
      list.innerHTML = "";
      data.active.forEach(u => {
        let d = document.createElement("div");
        d.innerText = u;
        list.appendChild(d);
      });

      renderPositions(data.positions || []);
      renderChart(data.chart || []);
    });
}

// POSITIONS
function renderPositions(activePositions){
  const container = document.getElementById("positions");
  container.innerHTML = "";

  const allPositions = [
    ...Array.from({length:9},(_,i)=>i+1),
    ...Array.from({length:8},(_,i)=>i+10),
    ...Array.from({length:8},(_,i)=>i+35)
  ];

  allPositions.forEach(p => {
    const box = document.createElement("div");
    box.className = "posBox " + (activePositions.includes(p) ? "red" : "green");
    box.innerText = p;
    container.appendChild(box);
  });
}

// CHART
function renderChart(data){
  const ctx = document.getElementById("chart").getContext("2d");

  if(chart) chart.destroy();

  chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: data.map(d => d.date),
      datasets: [{
        label: "Check-ins",
        data: data.map(d => d.count)
      }]
    }
  });
}
</script>

</body>
</html>
