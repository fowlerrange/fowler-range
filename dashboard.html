<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #111;
  color: white;
  text-align: center;
}

.container {
  padding: 20px;
}

.cards {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-bottom: 30px;
}

.card {
  background: #222;
  padding: 20px 40px;
  border-radius: 10px;
}

.big {
  font-size: 48px;
  font-weight: bold;
}

.label {
  font-size: 16px;
  color: #aaa;
}

#users {
  margin-top: 20px;
  font-size: 22px;
}

.user {
  display: inline-block;
  background: #333;
  padding: 10px 15px;
  margin: 5px;
  border-radius: 6px;
}

canvas {
  margin-top: 30px;
  max-width: 90%;
}

#refresh {
  position: fixed;
  bottom: 10px;
  right: 15px;
  font-size: 12px;
  color: #777;
}
</style>
</head>

<body>

<div class="container">

  <h1>Range Dashboard</h1>

  <div class="cards">
    <div class="card">
      <div id="total" class="big">0</div>
      <div class="label">Check-ins (Today)</div>
    </div>

    <div class="card">
      <div id="activeCount" class="big">0</div>
      <div class="label">Active Now</div>
    </div>
  </div>

  <div id="users"></div>

  <canvas id="chart" height="120"></canvas>

</div>

<div id="refresh"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzca5j3e6whvnA_TtT94mSJJujgo6kM7DaJX9wQ5DwJFBaOJ2T2vyg993g0nJEP1jZt/exec";
const KEY = "4570-SECURE-KEY";

async function loadDashboard(){
  try {
    let res = await fetch(API + "?key=" + KEY + "&action=dashboard&days=1");
    let data = await res.json();

    document.getElementById("total").innerText = data.total;
    document.getElementById("activeCount").innerText = data.active.length;

    // Active users
    let usersDiv = document.getElementById("users");
    usersDiv.innerHTML = "";

    data.active.forEach(u => {
      let div = document.createElement("div");
      div.className = "user";
      div.innerText = u;
      usersDiv.appendChild(div);
    });

    drawChart(data.hours);

    document.getElementById("refresh").innerText =
      "Last updated: " + new Date().toLocaleTimeString();

  } catch (e){
    console.error(e);
  }
}

function drawChart(hours){
  const canvas = document.getElementById("chart");
  const ctx = canvas.getContext("2d");

  ctx.clearRect(0,0,canvas.width,canvas.height);

  let max = Math.max(...hours, 1);
  let barWidth = canvas.width / 24;

  for(let i=0;i<24;i++){
    let h = hours[i];
    let height = (h / max) * canvas.height;

    ctx.fillStyle = "#4CAF50";
    ctx.fillRect(i * barWidth, canvas.height - height, barWidth - 2, height);
  }
}

// Auto refresh every 15 sec
setInterval(loadDashboard, 15000);

loadDashboard();
</script>

</body>
</html>
