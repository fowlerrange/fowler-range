<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { font-family: Arial; margin: 0; text-align: center; }
.screen { height: 100vh; display: none; flex-direction: column; justify-content: center; align-items: center; }
button { font-size: 18px; margin: 6px; padding: 8px 12px; min-width: 80px; }
input { font-size: 22px; padding: 10px; width: 250px; text-align: center; }
#positionsGrid, #supplyLines { display: flex; flex-direction: column; align-items: center; }
#supplies { padding-bottom: 200px; }
#status { color: red; margin-top: 10px; }
#timer { position: fixed; bottom: 5px; right: 10px; font-size: 14px; color: gray; }
#queueStatus { position: fixed; bottom: 25px; right: 10px; font-size: 13px; color: #555; }
.spinner { border: 6px solid #eee; border-top: 6px solid #333; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
@keyframes spin { 100% { transform: rotate(360deg); } }

#messageScreen { padding-left: 12%; padding-right: 12%; box-sizing: border-box; }
#messageText { font-size: 30px; line-height: 1.5; white-space: pre-wrap; text-align: center; margin-bottom: 40px; }
.rangeRow { margin-bottom: 12px; }
.errorBox { font-size: 24px; max-width: 700px; line-height: 1.4; padding: 20px; }
</style>
</head>

<body>

<div id="loading" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:9999; justify-content:center; align-items:center; flex-direction:column;"></div>

<div id="home" class="screen" style="display:flex;">
  <img src="Logo.jpeg" style="max-width:150px; margin-bottom:20px;">
  <h1 id="rangeTitle">Range Kiosk</h1>
  <button onclick="startCheckIn()">Check In</button>
  <button onclick="startCheckOut()">Check Out</button>
</div>

<div id="badRange" class="screen">
  <img src="Logo.jpeg" style="max-width:150px; margin-bottom:20px;">
  <div class="errorBox">
    This kiosk URL is missing or has an invalid range.<br><br>
    Please fix the URL.
  </div>
</div>

<div id="messageScreen" class="screen">
  <div id="messageText"></div>
  <button onclick="continueAfterMessage()">OK</button>
</div>

<div id="member" class="screen">
  <img src="Logo.jpeg" style="max-width:150px;">
  <h2>Enter Member ID</h2>
  <input id="memberInput" inputmode="numeric">
  <button onclick="goAfterMember()">Next</button>
</div>

<div id="autoMove" class="screen">
  <img src="Logo.jpeg" style="max-width:150px;">
  <div id="autoMoveText" style="font-size:24px; max-width:700px; line-height:1.4;"></div>
</div>

<div id="positions" class="screen">
  <img src="Logo.jpeg" style="max-width:150px;">
  <h2>Select Positions</h2>
  <p>Select all that apply</p>
  <div id="positionsGrid"></div>
  <button onclick="goAfterPositions()">Next</button>
</div>

<div id="supplies" class="screen">
  <img src="Logo.jpeg" style="max-width:150px;">
  <h2>Ammo / Caliber</h2>
  <p>Enter calibers you plan to use</p>
  <div id="supplyLines"></div>
  <button onclick="submitCheckIn()">Submit</button>
</div>

<div id="checkout" class="screen">
  <img src="Logo.jpeg" style="max-width:150px;">
  <h2>Check Out</h2>
  <div id="activeUsers"></div>
</div>

<div id="status"></div>
<div id="queueStatus"></div>
<div id="timer"></div>

<script>
const API = "PASTE_SCRIPT_URL_HERE";
const API_KEY = "PASTE_API_KEY_HERE";

let config = {};
let currentRangeId = "";
let currentRange = null;

let membersList = [];
let activeUsers = [];
let activeSessions = [];
let memberId = "";
let selectedPositions = [];
let submitting = false;
let checkingOut = false;

const MEMBER_TIMEOUT_MS = 5000;
const ACTIVE_TIMEOUT_MS = 3000;
const SUBMIT_TIMEOUT_MS = 7000;
const CONFIG_TIMEOUT_MS = 5000;

window.onload = function(){
  currentRangeId = getRangeFromUrl();
  loadCachedConfig();
  initConfig();
  loadCachedMembers();
  loadMembers();
  syncQueue();
  resetTimer();
  updateQueueStatus();
};

window.addEventListener("online", syncQueue);
setInterval(syncQueue, 10000);

function getRangeFromUrl(){
  const params = new URLSearchParams(window.location.search);
  return String(params.get("range") || "").toLowerCase().trim();
}

function fetchWithTimeout(url, timeoutMs){
  return Promise.race([
    fetch(url),
    new Promise((_, reject) =>
      setTimeout(() => reject(new Error("timeout")), timeoutMs)
    )
  ]);
}

function showLoading(){
  document.getElementById("loading").innerHTML =
    `<div style="font-size:22px; margin-bottom:15px;">Please wait...</div><div class="spinner"></div>`;
  document.getElementById("loading").style.display = "flex";
}

function showSuccess(message){
  document.getElementById("loading").innerHTML =
    `<div style="font-size:22px;">${message}</div>`;
  document.getElementById("loading").style.display = "flex";
}

function hideLoading(){
  document.getElementById("loading").style.display = "none";
}

function showScreen(id){
  setStatus("");
  document.querySelectorAll(".screen").forEach(s => s.style.display = "none");
  document.getElementById(id).style.display = "flex";

  setTimeout(()=>{
    let input = document.querySelector("#" + id + " input");
    if(input) input.focus();
  },300);
}

function setStatus(msg){
  document.getElementById("status").innerText = msg;
}

function loadCachedConfig(){
  try {
    config = JSON.parse(localStorage.getItem("rangeConfig") || "{}");
  } catch(e) {
    config = {};
  }
}

function initConfig(){
  fetchWithTimeout(API + "?action=config", CONFIG_TIMEOUT_MS)
    .then(r => r.json())
    .then(d => {
      config = d || {};
      localStorage.setItem("rangeConfig", JSON.stringify(config));
      applyRangeConfig();
    })
    .catch(() => {
      applyRangeConfig();
    });
}

function applyRangeConfig(){
  if(!currentRangeId || !config[currentRangeId]){
    showScreen("badRange");
    return;
  }

  currentRange = config[currentRangeId];
  document.getElementById("rangeTitle").innerText = currentRange.name;
  buildPositions();
  showScreen("home");
}

function loadCachedMembers(){
  try {
    const cached = JSON.parse(localStorage.getItem("membersCache") || "[]");
    if(cached.length && !membersList.length) {
      membersList = cached.map(String);
    }
  } catch(e) {}
}

function loadMembers(){
  fetchWithTimeout(API + "?key=" + API_KEY + "&action=members", MEMBER_TIMEOUT_MS)
    .then(r => r.json())
    .then(d => {
      membersList = d.map(x => String(x));
      localStorage.setItem("membersCache", JSON.stringify(membersList));
    })
    .catch(() => loadCachedMembers());
}

function loadActiveUsers(){
  return fetchWithTimeout(API + "?key=" + API_KEY + "&action=active&range=" + encodeURIComponent(currentRangeId), ACTIVE_TIMEOUT_MS)
    .then(r => r.json())
    .then(d => {
      activeUsers = d.map(x => String(x));
      localStorage.setItem("activeCache_" + currentRangeId, JSON.stringify(activeUsers));
    })
    .catch(() => {
      activeUsers = JSON.parse(localStorage.getItem("activeCache_" + currentRangeId) || "[]").map(String);
    });
}

function buildPositions(){
  if(!currentRange) return;

  const grid = document.getElementById("positionsGrid");
  grid.innerHTML = "";
  selectedPositions = [];

  (currentRange.rows || []).forEach(rowDef => {
    const section = document.createElement("div");
    section.className = "rangeRow";

    const h = document.createElement("h3");
    h.innerText = rowDef.label;

    const row = document.createElement("div");

    for(let i = 0; i < rowDef.count; i++){
      const n = rowDef.start + i;
      const value = rowDef.label + "-" + n;

      let b = document.createElement("button");
      b.innerText = n;

      b.onclick = () => {
        if(selectedPositions.includes(value)){
          selectedPositions = selectedPositions.filter(x => x !== value);
          b.style.background = "";
          b.style.color = "";
        } else {
          selectedPositions.push(value);
          b.style.background = "#4CAF50";
          b.style.color = "white";
        }
      };

      row.appendChild(b);
    }

    section.appendChild(h);
    section.appendChild(row);
    grid.appendChild(section);
  });
}

function buildSupplies(){
  const c = document.getElementById("supplyLines");
  c.innerHTML = "";

  for(let i=0;i<10;i++){
    let input = document.createElement("input");
    input.placeholder = "Caliber " + (i+1);
    input.disabled = i !== 0;

    input.oninput = () => {
      let inputs = c.querySelectorAll("input");
      for(let j=0;j<inputs.length;j++){
        inputs[j].disabled = (j !== 0 && inputs[j-1].value.trim() === "");
      }
    };

    c.appendChild(input);
  }
}

function startCheckIn(){
  if(!currentRange) {
    showScreen("badRange");
    return;
  }

  memberId = "";
  selectedPositions = [];
  buildPositions();

  loadMessages();
}

function loadMessages(){
  const files = [
    "message.txt?ts=" + Date.now(),
    "message-" + currentRangeId + ".txt?ts=" + Date.now()
  ];

  Promise.all(files.map(url =>
    fetch(url)
      .then(r => r.ok ? r.text() : "")
      .catch(() => "")
  ))
  .then(parts => {
    const text = parts.map(p => p.trim()).filter(Boolean).join("\n\n");

    if(text){
      document.getElementById("messageText").innerText = text;
      showScreen("messageScreen");
    } else {
      showScreen("member");
    }
  });
}

function continueAfterMessage(){
  showScreen("member");
}

async function goAfterMember(){
  let val = document.getElementById("memberInput").value.trim();

  if(!val){
    setStatus("Enter Member ID");
    return;
  }

  memberId = String(val);
  showLoading();

  if(!membersList.length) loadCachedMembers();

  if(!membersList.length){
    hideLoading();
    if(!confirm("Member list unavailable. Continue anyway?")) return;
    showLoading();
  } else if(!membersList.includes(memberId)){
    hideLoading();
    if(!confirm("Member not found. Continue?")) return;
    showLoading();
  }

  const result = await checkMemberGlobalStatus(memberId);

  hideLoading();

  if(result && result.active && result.range && result.range !== currentRangeId){
    const oldName = result.rangeName || result.range;

    document.getElementById("autoMoveText").innerText =
      "You are currently checked in at " + oldName + ".\n\nYou will be checked out there and checked in here.";

    showScreen("autoMove");

    setTimeout(() => {
      goNextCheckInStep();
    }, 3000);

    return;
  }

  if(result && result.active && result.range === currentRangeId){
    if(confirm("You are already checked in here. Check out?")){
      checkout(memberId);
    } else {
      showScreen("home");
    }
    return;
  }

  goNextCheckInStep();
}

function checkMemberGlobalStatus(id){
  return fetchWithTimeout(API + "?key=" + API_KEY + "&action=memberStatus&memberId=" + encodeURIComponent(id), ACTIVE_TIMEOUT_MS)
    .then(r => r.json())
    .catch(() => null);
}

function goNextCheckInStep(){
  if(currentRange.rows && currentRange.rows.length > 0){
    showScreen("positions");
    return;
  }

  if(currentRange.ammo){
    goSupplies();
    return;
  }

  submitCheckIn();
}

function goAfterPositions(){
  if(currentRange.ammo){
    goSupplies();
  } else {
    submitCheckIn();
  }
}

function goSupplies(){
  showLoading();
  setTimeout(() => {
    buildSupplies();
    hideLoading();
    showScreen("supplies");
  },200);
}

function buildSubmitUrl(item){
  return API +
    "?key=" + API_KEY +
    "&action=submit" +
    "&range=" + encodeURIComponent(item.range || currentRangeId) +
    "&memberId=" + encodeURIComponent(item.memberId) +
    "&positions=" + encodeURIComponent(item.positions || "") +
    "&supplies=" + encodeURIComponent(item.supplies || "") +
    "&type=" + encodeURIComponent(item.type) +
    "&queued=" + encodeURIComponent(item.queued || "") +
    "&clientId=" + encodeURIComponent(item.clientId || "");
}

function getQueue(){
  return JSON.parse(localStorage.getItem("offlineQueue") || "[]");
}

function saveQueue(q){
  localStorage.setItem("offlineQueue", JSON.stringify(q));
  updateQueueStatus();
}

function queueSubmission(item){
  const q = getQueue();

  if(!item.clientId){
    item.clientId = "client_" + Date.now() + "_" + Math.floor(Math.random() * 1000000);
  }

  q.push(item);
  saveQueue(q);
}

function updateQueueStatus(){
  const n = getQueue().length;
  document.getElementById("queueStatus").innerText = n ? ("Pending uploads: " + n) : "";
}

function sendSubmission(item){
  return fetchWithTimeout(buildSubmitUrl(item), SUBMIT_TIMEOUT_MS)
    .then(r => r.json())
    .then(res => {
      if(res.error) throw new Error(res.error);
      return res;
    });
}

function syncQueue(){
  const q = getQueue();

  if(!q.length || !navigator.onLine){
    updateQueueStatus();
    return;
  }

  const item = q[0];

  sendSubmission(item)
    .then(() => {
      q.shift();
      saveQueue(q);
      syncQueue();
    })
    .catch(() => updateQueueStatus());
}

function submitCheckIn(){
  if(submitting) return;
  submitting = true;
  showLoading();

  let supplies = [];
  document.querySelectorAll("#supplyLines input").forEach(i => {
    if(i.value.trim()) supplies.push(i.value.trim());
  });

  const item = {
    range: currentRangeId,
    memberId,
    positions: selectedPositions.join(","),
    supplies: supplies.join(","),
    type: "IN",
    queued: "",
    clientId: "client_" + Date.now() + "_" + Math.floor(Math.random() * 1000000)
  };

  sendSubmission(item)
    .then(res => {
      if(res.autoCheckout && res.autoCheckout.rangeName){
        showSuccess("Checked out from " + res.autoCheckout.rangeName + ".\nSuccessfully Checked In");
      } else {
        showSuccess("Successfully Checked In");
      }

      setTimeout(() => location.reload(), 2200);
    })
    .catch(err => {
      if(
        !navigator.onLine ||
        String(err.message).includes("Failed to fetch") ||
        String(err.message).includes("timeout")
      ){
        item.queued = new Date().toISOString();
        queueSubmission(item);
        showSuccess("Saved. Will upload when online.");
        setTimeout(() => location.reload(), 2500);
      } else {
        submitting = false;
        hideLoading();
        setStatus(err.message || "Error");
      }
    });
}

function startCheckOut(){
  if(!currentRange) {
    showScreen("badRange");
    return;
  }

  showLoading();

  loadActiveUsers().then(() => {
    hideLoading();

    let div = document.getElementById("activeUsers");
    div.innerHTML = "";

    if(activeUsers.length === 0){
      div.innerHTML = "<p>No active users</p>";
      showScreen("checkout");
      setTimeout(() => location.reload(),3000);
      return;
    }

    activeUsers.forEach(id => {
      let b = document.createElement("button");
      b.innerText = id;
      b.onclick = () => checkout(id);
      div.appendChild(b);
    });

    showScreen("checkout");
  });
}

function checkout(id){
  if(checkingOut) return;
  checkingOut = true;
  showLoading();

  const item = {
    range: currentRangeId,
    memberId: String(id),
    positions: "",
    supplies: "",
    type: "OUT",
    queued: "",
    clientId: "client_" + Date.now() + "_" + Math.floor(Math.random() * 1000000)
  };

  sendSubmission(item)
    .then(() => {
      showSuccess("Successfully Checked Out");
      setTimeout(() => location.reload(), 2000);
    })
    .catch(err => {
      if(
        !navigator.onLine ||
        String(err.message).includes("Failed to fetch") ||
        String(err.message).includes("timeout")
      ){
        item.queued = new Date().toISOString();
        queueSubmission(item);
        showSuccess("Saved. Will upload when online.");
        setTimeout(() => location.reload(), 2500);
      } else {
        checkingOut = false;
        hideLoading();
        setStatus(err.message || "Error");
      }
    });
}

let idle = 60;

setInterval(() => {
  idle--;
  document.getElementById("timer").innerText = "Reset in " + idle + "s";

  if(idle <= 0){
    location.reload();
  }
},1000);

function resetTimer(){
  idle = 60;
}

document.onclick = resetTimer;
document.onmousemove = resetTimer;
document.onkeypress = resetTimer;
</script>
</body>
</html>
