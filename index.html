<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: Arial;
  margin: 0;
  text-align: center;
}

.screen {
  height: 100vh;
  display: none;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

button {
  font-size: 18px;
  margin: 6px;
  padding: 6px 10px;
  min-width: 60px;
}

input {
  font-size: 22px;
  padding: 10px;
  width: 250px;
  text-align: center;
}

#positionsGrid,
#supplyLines {
  display: flex;
  flex-direction: column;
  align-items: center;
}

#supplies {
  padding-bottom: 200px;
}

#status {
  color: red;
  margin-top: 10px;
}

#timer {
  position: fixed;
  bottom: 5px;
  right: 10px;
  font-size: 14px;
  color: gray;
}

#queueStatus {
  position: fixed;
  bottom: 25px;
  right: 10px;
  font-size: 13px;
  color: #555;
}

.spinner {
  border: 6px solid #eee;
  border-top: 6px solid #333;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% {
    transform: rotate(360deg);
  }
}

/* NEW MESSAGE SCREEN */
#messageScreen{
  padding-left: 12%;
  padding-right: 12%;
  box-sizing:border-box;
}

#messageText{
  font-size: 30px;
  line-height: 1.5;
  white-space: pre-wrap;
  text-align: center;
  margin-bottom: 40px;
}
</style>
</head>

<body>

<div id="loading"
style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:9999; justify-content:center; align-items:center; flex-direction:column;">
</div>


<!-- HOME -->
<div id="home" class="screen" style="display:flex;">
  <img src="Logo.jpeg" style="max-width:150px; margin-bottom:20px;">
  <h1>Fowler Range</h1>

  <button onclick="startCheckIn()">Check In</button>
  <button onclick="startCheckOut()">Check Out</button>
</div>


<!-- MESSAGE -->
<div id="messageScreen" class="screen">

  <div id="messageText"></div>

  <button onclick="continueAfterMessage()">OK</button>

</div>


<!-- MEMBER -->
<div id="member" class="screen">
  <img src="Logo.jpeg" style="max-width:150px;">

  <h2>Enter Member ID</h2>

  <input id="memberInput" inputmode="numeric">

  <button onclick="goPositions()">Next</button>
</div>


<!-- POSITIONS -->
<div id="positions" class="screen">
  <img src="Logo.jpeg" style="max-width:150px;">

  <h2>Select Positions</h2>

  <p>Select all that apply</p>

  <div id="positionsGrid"></div>

  <button onclick="goSupplies()">Next</button>
</div>


<!-- SUPPLIES -->
<div id="supplies" class="screen">
  <img src="Logo.jpeg" style="max-width:150px;">

  <h2>Ammo / Caliber</h2>

  <p>Enter calibers you plan to use</p>

  <div id="supplyLines"></div>

  <button onclick="submitCheckIn()">Submit</button>
</div>


<!-- CHECKOUT -->
<div id="checkout" class="screen">
  <img src="Logo.jpeg" style="max-width:150px;">

  <h2>Check Out</h2>

  <div id="activeUsers"></div>
</div>


<div id="status"></div>
<div id="queueStatus"></div>
<div id="timer"></div>


<script>

const API="https://script.google.com/macros/s/AKfycbyvqHPcOLMC-cKoU6cUKed6rs1YNcizbEy6MkJWACEqrDu6oyprDBjPjl20_EwtfohT/exec";
const API_KEY="950218067144772919";

let membersList=[];
let activeUsers=[];
let memberId="";
let selectedPositions=[];

let submitting=false;
let checkingOut=false;


// INIT
window.onload=function(){
  buildPositions();
  loadMembers();
  loadCachedMembers();
  syncQueue();
  resetTimer();
  updateQueueStatus();
};


window.addEventListener("online",syncQueue);

setInterval(syncQueue,10000);


// LOADING
function showLoading(){
  document.getElementById("loading").innerHTML=
  `<div style="font-size:22px; margin-bottom:15px;">Please wait...</div>
   <div class="spinner"></div>`;

  document.getElementById("loading").style.display="flex";
}


function showSuccess(message){
  document.getElementById("loading").innerHTML=
  `<div style="font-size:22px;">${message}</div>`;

  document.getElementById("loading").style.display="flex";
}


function hideLoading(){
  document.getElementById("loading").style.display="none";
}


// UI
function showScreen(id){

  setStatus("");

  document.querySelectorAll(".screen")
    .forEach(s=>s.style.display="none");

  document.getElementById(id).style.display="flex";

  setTimeout(()=>{
    let input=document.querySelector("#"+id+" input");

    if(input) input.focus();

  },300);
}


function setStatus(msg){
  document.getElementById("status").innerText=msg;
}


// MESSAGE FILE
function startCheckIn(){

  memberId="";
  selectedPositions=[];

  fetch("message.txt?ts="+Date.now())

  .then(r=>{
    if(!r.ok) throw new Error();
    return r.text();
  })

  .then(text=>{

    text=text.trim();

    if(text){

      document.getElementById("messageText").innerText=text;

      showScreen("messageScreen");

    }else{

      showScreen("member");

    }

  })

  .catch(()=>{

    showScreen("member");

  });

}


function continueAfterMessage(){

  showScreen("member");

}


// EVERYTHING BELOW IS UNCHANGED
// (positions, offline queue, active users, submit, checkout, timers)

</script>

</body>
</html>
