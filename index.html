<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { font-family: Arial; margin: 0; text-align: center; }
.screen { height: 100vh; display: none; flex-direction: column; justify-content: center; align-items: center; }
button { font-size: 18px; margin: 6px; padding: 6px 10px; min-width: 60px; }
input { font-size: 22px; padding: 10px; width: 250px; text-align: center; }
#positionsGrid, #supplyLines { display: flex; flex-direction: column; align-items: center; }
#supplies { padding-bottom: 200px; }
#status { color: red; margin-top: 10px; }
#timer { position: fixed; bottom: 5px; right: 10px; font-size: 14px; color: gray; }
#queueStatus { position: fixed; bottom: 25px; right: 10px; font-size: 13px; color: #555; }
.spinner { border: 6px solid #eee; border-top: 6px solid #333; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
@keyframes spin { 100% { transform: rotate(360deg); } }
.noticeBox { max-width: 760px; font-size: 22px; line-height: 1.45; white-space: pre-wrap; margin: 20px; padding: 20px; border: 1px solid #ddd; border-radius: 8px; background: #fafafa; text-align: left; }
</style>
</head>
<body>
<div id="loading" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:9999; justify-content:center; align-items:center; flex-direction:column;"></div>

<div id="home" class="screen" style="display:flex;">
  <img src="Logo.jpeg" style="max-width:150px; margin-bottom:20px;">
  <h1>Fowler Range</h1>
  <button onclick="startCheckIn()">Check In</button>
  <button onclick="startCheckOut()">Check Out</button>
</div>

<div id="messageScreen" class="screen">
  <img src="Logo.jpeg" style="max-width:150px;">
  <h2>Notice</h2>
  <div id="messageText" class="noticeBox"></div>
  <button onclick="continueAfterMessage()">OK</button>
</div>

<div id="member" class="screen">
  <img src="Logo.jpeg" style="max-width:150px;">
  <h2>Enter Member ID</h2>
  <input id="memberInput" inputmode="numeric">
  <button onclick="goPositions()">Next</button>
</div>

<div id="positions" class="screen">
  <img src="Logo.jpeg" style="max-width:150px;">
  <h2>Select Positions</h2>
  <p>Select all that apply</p>
  <div id="positionsGrid"></div>
  <button onclick="goSupplies()">Next</button>
</div>

<div id="supplies" class="screen">
  <img src="Logo.jpeg" style="max-width:150px;">
  <h2>Ammo / Caliber</h2>
  <p>Enter calibers you plan to use</p>
  <div id="supplyLines"></div>
  <button onclick="submitCheckIn()">Submit</button>
</div>

<div id="checkout" class="screen">
  <img src="Logo.jpeg" style="max-width:150px;">
  <h2>Check Out</h2>
  <div id="activeUsers"></div>
</div>

<div id="status"></div>
<div id="queueStatus"></div>
<div id="timer"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbyvqHPcOLMC-cKoU6cUKed6rs1YNcizbEy6MkJWACEqrDu6oyprDBjPjl20_EwtfohT/exec";
const API_KEY = "950218067144772919";

// Slow Wi-Fi handling. If a call takes longer than this, treat it like offline.
const FAST_TIMEOUT_MS = 6000;
const MEMBER_TIMEOUT_MS = 6000;
const QUEUE_RETRY_MS = 15000;

let membersList = [];
let activeUsers = [];
let memberId = "";
let selectedPositions = [];
let submitting = false;
let checkingOut = false;
let offlineMode = false;

window.onload = function(){
  buildPositions();
  loadCachedMembers();
  loadMembers();
  syncQueue();
  resetTimer();
  updateQueueStatus();
};

window.addEventListener("online", syncQueue);
setInterval(syncQueue, QUEUE_RETRY_MS);

function fetchWithTimeout(url, timeoutMs){
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), timeoutMs);
  return fetch(url, { signal: controller.signal }).finally(() => clearTimeout(timeout));
}

function markOfflineMode(on){
  offlineMode = on;
  updateQueueStatus();
}

function showLoading(){
  document.getElementById("loading").innerHTML = `<div style="font-size:22px; margin-bottom:15px;">Please wait...</div><div class="spinner"></div>`;
  document.getElementById("loading").style.display = "flex";
}
function showSuccess(message){
  document.getElementById("loading").innerHTML = `<div style="font-size:22px;">${message}</div>`;
  document.getElementById("loading").style.display = "flex";
}
function hideLoading(){ document.getElementById("loading").style.display = "none"; }

function showScreen(id){
  setStatus("");
  document.querySelectorAll(".screen").forEach(s => s.style.display = "none");
  document.getElementById(id).style.display = "flex";
  setTimeout(()=>{ let input = document.querySelector("#"+id+" input"); if(input) input.focus(); },300);
}
function setStatus(msg){ document.getElementById("status").innerText = msg; }

function loadCachedMembers(){
  try {
    const cached = JSON.parse(localStorage.getItem("membersCache") || "[]");
    if (cached.length) membersList = cached.map(String);
  } catch(e) {}
}

function loadMembers(){
  return fetchWithTimeout(API + "?key=" + API_KEY + "&action=members", MEMBER_TIMEOUT_MS)
  .then(r=>r.json())
  .then(d=>{
    membersList = d.map(x=>String(x));
    localStorage.setItem("membersCache", JSON.stringify(membersList));
    markOfflineMode(false);
  })
  .catch(()=>{
    loadCachedMembers();
    markOfflineMode(true);
  });
}

function loadActiveUsers(){
  return fetchWithTimeout(API + "?key=" + API_KEY + "&action=active", FAST_TIMEOUT_MS)
  .then(r=>r.json())
  .then(d=>{
    activeUsers = d.map(x=>String(x));
    localStorage.setItem("activeCache", JSON.stringify(activeUsers));
    markOfflineMode(false);
  })
  .catch(()=>{
    activeUsers = JSON.parse(localStorage.getItem("activeCache") || "[]").map(String);
    markOfflineMode(true);
  });
}

function buildPositions(){
  const grid = document.getElementById("positionsGrid");
  grid.innerHTML="";
  function makeRow(title, nums){
    let section = document.createElement("div");
    let h = document.createElement("h3");
    h.innerText = title;
    let row = document.createElement("div");
    nums.forEach(n=>{
      let b = document.createElement("button");
      b.innerText=n;
      b.onclick=()=>{
        if(selectedPositions.includes(n)){
          selectedPositions=selectedPositions.filter(x=>x!==n); b.style.background=""; b.style.color="";
        }else{
          selectedPositions.push(n); b.style.background="#4CAF50"; b.style.color="white";
        }
      };
      row.appendChild(b);
    });
    section.appendChild(h); section.appendChild(row); grid.appendChild(section);
  }
  makeRow("25 Yards",[1,2,3,4,5,6,7,8,9]);
  makeRow("50 Yards",[10,11,12,13,14,15,16,17]);
  makeRow("100 Yards",[35,36,37,38,39,40,41,42]);
}

function buildSupplies(){
  const c = document.getElementById("supplyLines");
  c.innerHTML="";
  for(let i=0;i<10;i++){
    let input=document.createElement("input");
    input.placeholder="Caliber "+(i+1);
    input.disabled = i!==0;
    input.oninput=()=>{
      let inputs=c.querySelectorAll("input");
      for(let j=0;j<inputs.length;j++) inputs[j].disabled = (j!==0 && inputs[j-1].value.trim()==="");
    };
    c.appendChild(input);
  }
}

function startCheckIn(){
  memberId="";
  selectedPositions=[];
  submitting=false;
  checkForMessage();
}

function checkForMessage(){
  showLoading();
  fetchWithTimeout("message.txt?ts=" + Date.now(), 1200)
    .then(r => {
      if(!r.ok) throw new Error("No message");
      return r.text();
    })
    .then(text => {
      hideLoading();
      text = text.trim();
      if(text){
        document.getElementById("messageText").innerText = text;
        showScreen("messageScreen");
      } else {
        showScreen("member");
      }
    })
    .catch(() => {
      hideLoading();
      showScreen("member");
    });
}

function continueAfterMessage(){ showScreen("member"); }

async function goPositions(){
  let val=document.getElementById("memberInput").value.trim();
  if(!val){ setStatus("Enter Member ID"); return; }
  memberId=String(val);
  showLoading();

  if(!membersList.length) loadCachedMembers();
  if(!membersList.length){
    hideLoading();
    if(!confirm("Member list unavailable. Continue anyway?")) return;
    showLoading();
  } else if(!membersList.includes(memberId)){
    hideLoading();
    if(!confirm("Member not found. Continue?")) return;
    showLoading();
  }

  await loadActiveUsers();
  if(activeUsers.includes(memberId)){
    hideLoading();
    if(confirm("Already checked in. Check out?")) checkout(memberId); else showScreen("home");
    return;
  }
  hideLoading();
  showScreen("positions");
}

function goSupplies(){ showLoading(); setTimeout(()=>{ buildSupplies(); hideLoading(); showScreen("supplies"); },200); }

function buildSubmitUrl(item){
  return API +
    "?key=" + API_KEY +
    "&action=submit" +
    "&memberId=" + encodeURIComponent(item.memberId) +
    "&positions=" + encodeURIComponent(item.positions || "") +
    "&supplies=" + encodeURIComponent(item.supplies || "") +
    "&type=" + encodeURIComponent(item.type) +
    "&queued=" + encodeURIComponent(item.queued || "") +
    "&clientId=" + encodeURIComponent(item.clientId || "");
}

function getQueue(){ return JSON.parse(localStorage.getItem("offlineQueue") || "[]"); }
function saveQueue(q){ localStorage.setItem("offlineQueue", JSON.stringify(q)); updateQueueStatus(); }
function queueSubmission(item){
  const q=getQueue();
  item.clientId = item.clientId || (Date.now() + "_" + Math.random().toString(16).slice(2));
  q.push(item);
  saveQueue(q);
}
function updateQueueStatus(){
  const n=getQueue().length;
  if(offlineMode){
    document.getElementById("queueStatus").innerText = n ? ("Offline mode - pending uploads: "+n) : "Offline mode";
  } else {
    document.getElementById("queueStatus").innerText = n ? ("Pending uploads: "+n) : "";
  }
}

function sendSubmission(item, timeoutMs){
  return fetchWithTimeout(buildSubmitUrl(item), timeoutMs || FAST_TIMEOUT_MS).then(r=>r.json()).then(res=>{
    if(res.error) throw new Error(res.error);
    return res;
  });
}

function syncQueue(){
  const q = getQueue();
  if(!q.length || !navigator.onLine) { updateQueueStatus(); return; }
  const item = q[0];
  sendSubmission(item, 5000).then(()=>{
    q.shift(); saveQueue(q); markOfflineMode(false); syncQueue();
  }).catch(()=> {
    markOfflineMode(true);
    updateQueueStatus();
  });
}

function submitCheckIn(){
  if(submitting) return;
  submitting=true;
  showLoading();

  let supplies=[];
  document.querySelectorAll("#supplyLines input").forEach(i=>{ if(i.value.trim()) supplies.push(i.value.trim()); });
  const item = {
    memberId,
    positions: selectedPositions.join(","),
    supplies: supplies.join(","),
    type: "IN",
    queued: "",
    clientId: Date.now() + "_" + Math.random().toString(16).slice(2)
  };

  sendSubmission(item, FAST_TIMEOUT_MS).then(()=>{
    showSuccess("Successfully Checked In");
    setTimeout(()=>location.reload(), 2000);
  }).catch(err=>{
    const msg = String(err.message || "");
    if(!navigator.onLine || msg.includes("Failed to fetch") || msg.includes("aborted") || msg.includes("AbortError") || err.name === "AbortError"){
      item.queued = new Date().toISOString();
      queueSubmission(item);
      markOfflineMode(true);
      showSuccess("Saved. Will upload when online.");
      setTimeout(()=>location.reload(), 2500);
    } else {
      submitting=false; hideLoading(); setStatus(msg || "Error");
    }
  });
}

function startCheckOut(){
  showLoading();
  loadActiveUsers().then(()=>{
    hideLoading();
    let div = document.getElementById("activeUsers");
    div.innerHTML = "";
    if(activeUsers.length === 0){
      div.innerHTML = offlineMode ? "<p>No active users found in cached list</p>" : "<p>No active users</p>";
      showScreen("checkout"); setTimeout(()=>location.reload(),3000); return;
    }
    activeUsers.forEach(id=>{
      let b = document.createElement("button");
      b.innerText = id;
      b.onclick = () => checkout(id);
      div.appendChild(b);
    });
    showScreen("checkout");
  });
}

function checkout(id){
  if(checkingOut) return;
  checkingOut = true;
  showLoading();
  const item = {
    memberId: String(id),
    positions: "",
    supplies: "",
    type: "OUT",
    queued: "",
    clientId: Date.now() + "_" + Math.random().toString(16).slice(2)
  };

  sendSubmission(item, FAST_TIMEOUT_MS).then(()=>{
    showSuccess("Successfully Checked Out");
    setTimeout(()=>location.reload(), 2000);
  }).catch(err=>{
    const msg = String(err.message || "");
    if(!navigator.onLine || msg.includes("Failed to fetch") || msg.includes("aborted") || msg.includes("AbortError") || err.name === "AbortError"){
      item.queued = new Date().toISOString();
      queueSubmission(item);
      markOfflineMode(true);
      showSuccess("Saved. Will upload when online.");
      setTimeout(()=>location.reload(), 2500);
    } else {
      checkingOut = false; hideLoading(); setStatus(msg || "Error");
    }
  });
}

let idle=60;
setInterval(()=>{ idle--; document.getElementById("timer").innerText="Reset in "+idle+"s"; if(idle<=0) location.reload(); },1000);
function resetTimer(){ idle=60; }
document.onclick=resetTimer; document.onmousemove=resetTimer; document.onkeypress=resetTimer;
</script>
</body>
</html>
