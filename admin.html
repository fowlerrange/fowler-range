<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
  font-family: Arial;
  margin: 0;
  padding: 20px;
  text-align: center;
}
.card {
  border: 1px solid #ccc;
  border-radius: 8px;
  padding: 15px;
  margin: 15px auto;
  max-width: 700px;
}
button {
  font-size: 16px;
  padding: 10px 14px;
  margin: 6px;
}
input {
  font-size: 18px;
  padding: 8px;
  width: 220px;
}
.status {
  font-weight: bold;
  margin: 15px;
}
.good { color: green; }
.bad { color: red; }
table {
  border-collapse: collapse;
  width: 100%;
  font-size: 13px;
}
td, th {
  border: 1px solid #ccc;
  padding: 4px;
}
</style>
</head>

<body>

<h1>Fowler Range Admin</h1>

<div id="status" class="status">Loading...</div>

<div class="card">
  <h2>Active Users</h2>
  <button onclick="loadActive()">Refresh Active Users</button>
  <div id="activeUsers"></div>
</div>

<div class="card">
  <h2>Force Checkout</h2>
  <input id="forceMember" placeholder="Member ID" inputmode="numeric">
  <button onclick="forceCheckoutManual()">Force Checkout</button>
</div>

<div class="card">
  <h2>Clear All Active Sessions</h2>
  <button onclick="clearStuck()">Clear All Active Users</button>
</div>

<div class="card">
  <h2>Backup</h2>
  <button onclick="backupNow()">Run Backup Now</button>
</div>

<div class="card">
  <h2>Recent Logs</h2>
  <button onclick="loadLogs()">Refresh Logs</button>
  <div id="logs"></div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxUO8fZMO3ziCCVJFza0_Pd1xVVZyVhNMiSd-omSAO_zvgWHe3SQIiD4r_Jun7TKA5q/exec";
const API_KEY = "950218067144772919";

function setStatus(msg, ok=true){
  const s = document.getElementById("status");
  s.innerText = msg;
  s.className = "status " + (ok ? "good" : "bad");
}

function jsonp(action, params, callback){
  const cbName = "cb_" + Math.floor(Math.random() * 1000000000);

  window[cbName] = function(data){
    delete window[cbName];
    script.remove();
    callback(data);
  };

  let url = API +
    "?action=" + encodeURIComponent(action) +
    "&key=" + encodeURIComponent(API_KEY) +
    "&cb=" + cbName;

  Object.keys(params || {}).forEach(k => {
    url += "&" + encodeURIComponent(k) + "=" + encodeURIComponent(params[k]);
  });

  const script = document.createElement("script");
  script.onerror = function(){
    setStatus("Request failed", false);
    delete window[cbName];
    script.remove();
  };

  script.src = url;
  document.body.appendChild(script);
}

function loadActive(){
  setStatus("Loading active users...");

  jsonp("adminActive", {}, function(data){
    const div = document.getElementById("activeUsers");
    div.innerHTML = "";

    if(!Array.isArray(data) || data.length === 0){
      div.innerHTML = "<p>No active users</p>";
      setStatus("Loaded. No active users.");
      return;
    }

    data.forEach(id => {
      const b = document.createElement("button");
      b.innerText = "Checkout " + id;
      b.onclick = function(){
        forceCheckout(id);
      };
      div.appendChild(b);
    });

    setStatus("Active users loaded.");
  });
}

function forceCheckoutManual(){
  const id = document.getElementById("forceMember").value.trim();

  if(!id){
    setStatus("Enter a member ID", false);
    return;
  }

  forceCheckout(id);
}

function forceCheckout(id){
  if(!confirm("Force checkout member " + id + "?")) return;

  setStatus("Checking out " + id + "...");

  jsonp("adminForceCheckout", { memberId: id }, function(data){
    if(data && data.success){
      setStatus("Member " + id + " checked out.");
      loadActive();
      loadLogs();
    } else {
      setStatus((data && data.error) ? data.error : "Force checkout failed", false);
    }
  });
}

function clearStuck(){
  if(!confirm("Clear/check out ALL active users?")) return;

  setStatus("Clearing active sessions...");

  jsonp("adminClearStuck", {}, function(data){
    if(data && data.success){
      setStatus("Cleared " + data.cleared + " active session(s).");
      loadActive();
      loadLogs();
    } else {
      setStatus("Clear failed", false);
    }
  });
}

function backupNow(){
  setStatus("Running backup...");

  jsonp("adminBackupNow", {}, function(data){
    if(data && data.success){
      setStatus("Backup completed.");
    } else {
      setStatus("Backup failed", false);
    }
  });
}

function loadLogs(){
  setStatus("Loading logs...");

  jsonp("adminLogs", {}, function(data){
    const div = document.getElementById("logs");
    div.innerHTML = "";

    if(!Array.isArray(data) || data.length === 0){
      div.innerHTML = "<p>No logs found</p>";
      setStatus("Logs loaded.");
      return;
    }

    const table = document.createElement("table");

    data.forEach(row => {
      const tr = document.createElement("tr");

      row.forEach(cell => {
        const td = document.createElement("td");
        td.innerText = cell;
        tr.appendChild(td);
      });

      table.appendChild(tr);
    });

    div.appendChild(table);
    setStatus("Logs loaded.");
  });
}

window.onload = function(){
  loadActive();
  loadLogs();
};
</script>

</body>
</html>
